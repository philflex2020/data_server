# check_sites.sh site definitions
#
# Each site is checked via SSH — all port/HTTP probes run on the remote host
# so they work even if ports are firewalled (e.g. AWS security groups).
#
# Auth (pick one per site):
#   ssh_key: ~/.ssh/id_rsa          # path to private key; expands ~
#   ssh_password: secret            # password auth — requires sshpass installed
#   (neither)                       # uses SSH agent / default key

sites:

  # ── Edge writer (phil-dev) ──────────────────────────────────────────────────
  - name: phil-dev
    host: phil-dev
    user: phil
    # ssh_key: ~/.ssh/id_rsa
    type: edge
    parquet_dirs:
      - /srv/data/parquet

  # ── AWS-sim testbed (fractal-phil) ─────────────────────────────────────────
  - name: fractal-phil
    host: 192.168.86.51
    user: phil
    type: aws-sim
    parquet_dirs:
      - /srv/data/parquet
      - /srv/data/parquet-aws-sim
    systemd_services:
      - flashmq
      - influxdb
      - telegraf

  # ── AWS production example (commented out) ─────────────────────────────────
