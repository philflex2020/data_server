listen {
    port 1883
    protocol mqtt
    tcp_nodelay true
}

listen {
    port 9001
    protocol websockets
}

allow_anonymous true
log_level warning
storage_dir /var/lib/flashmq

client_initial_buffer_size 4194304
max_packet_size 1048576
max_qos_msg_pending_per_client 65535
thread_count 2

# ── Bridge from external MQTT source ────────────────────────────────────────
# Uncomment and set 'address' to pull from a remote broker.
# The broker will subscribe to ems/# on the remote host and republish locally
# so the writer container sees all messages without any config changes.
#
# Example — pull from gx10 (192.168.86.48):
#   bridge {
#       address 192.168.86.48
#       port 1883
#       topic ems/#  in  0
#       clientid evelyn34-bridge
#   }
#
# Example — pull from a real EMS FlashMQ:
#   bridge {
#       address <EMS_IP>
#       port 1883
#       topic ems/#  in  0
#       clientid evelyn34-bridge
#   }
#
# After editing, restart the broker container:
#   docker restart evelyn34_broker
