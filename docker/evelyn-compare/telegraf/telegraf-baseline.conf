# telegraf-baseline.conf — EMS ingest, NO filtering
#
# Mirrors the Longbow production path as-is:
#   - All signal types ingested (float, integer, boolean_integer, string)
#   - No deduplication
#   - All 81,420 msg/s → InfluxDB
#
# This is the baseline for cost comparison.

[agent]
  interval          = "1s"
  round_interval    = true
  metric_batch_size = 5000
  metric_buffer_limit = 100000
  flush_interval    = "5s"
  flush_jitter      = "1s"
  precision         = "1ms"
  omit_hostname     = true

# ── Input: EMS MQTT — all signals ────────────────────────────────────────
[[inputs.mqtt_consumer]]
  name_override = "ems"
  servers       = ["tcp://flashmq-baseline:1883"]
  topics        = ["unit/#"]
  qos           = 0
  client_id     = "telegraf-ems-baseline"
  connection_timeout = "30s"

  # Parse JSON payload: {"ts":"2024-11-15T21:27:52.775Z","value":3.14}
  data_format = "json"

  # Parse topic segments into tags
  # Topic: unit/{unit_id}/{device}/{instance}/{point_name}/{dtype}
  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "unit/+/+/+/+/+"
    tags        = "_/unit_id/device/instance/point_name/dtype"

# ── Internal metrics — exposes row ingestion rate ─────────────────────────
[[inputs.internal]]
  collect_memstats = false

# ── Output: InfluxDB v2 baseline ──────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb-baseline:8086"]
  token        = "ems-token-secret"
  organization = "ems-org"
  bucket       = "ems-baseline"
  timeout      = "10s"
