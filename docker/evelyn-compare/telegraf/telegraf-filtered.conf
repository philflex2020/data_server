# telegraf-filtered.conf — EMS ingest with Filter A + Filter B
#
# Demonstrates "Conservative" savings from evelyn_cost_analysis.html:
#
#   Filter A — Drop string dtype rows (~4% of total)
#     Implementation: subscribe to only float/integer/boolean_integer topics.
#     String enumerations (FEMS_PCS_State, InvStatus, Mode, etc.) are never
#     ingested — zero Telegraf CPU wasted on non-numeric signals.
#
#   Filter B — Integer/boolean change-on-value (COV) deduplication
#     Implementation: [[processors.dedup]] on ems_int measurements.
#     Status flags and mode registers repeat at full EMS rate (1770 × 46 = 81k/s)
#     even when unchanged. Dedup suppresses repeats for 10 minutes.
#     Reduction: ~92.8% of int/bool rows are redundant → ~90% reduction.
#
# Combined savings: ~26.8% fewer rows (Conservative scenario).
# Fleet projection (50 units): 58 TB/yr → 42 TB/yr.

[agent]
  interval          = "1s"
  round_interval    = true
  metric_batch_size = 5000
  metric_buffer_limit = 100000
  flush_interval    = "5s"
  flush_jitter      = "1s"
  precision         = "1ms"
  omit_hostname     = true

# ── Input A: Float signals — no dedup ────────────────────────────────────
# Subscribe only to float dtype — string rows never enter the pipeline.
[[inputs.mqtt_consumer]]
  name_override = "ems_float"
  servers       = ["tcp://flashmq-filtered:1883"]
  topics        = ["unit/+/+/+/+/float"]
  qos           = 0
  client_id     = "telegraf-ems-filtered-float"
  connection_timeout = "30s"

  data_format = "json"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "unit/+/+/+/+/float"
    tags  = "_/unit_id/device/instance/point_name/dtype"

# ── Input B: Integer + Boolean signals — fed through dedup ────────────────
# Subscribe only to integer/boolean dtype — strings excluded.
# These signals change rarely; dedup holds the last value for 10 minutes
# and only passes a new point when the value actually changes.
[[inputs.mqtt_consumer]]
  name_override = "ems_int"
  servers       = ["tcp://flashmq-filtered:1883"]
  topics        = ["unit/+/+/+/+/integer", "unit/+/+/+/+/boolean_integer"]
  qos           = 0
  client_id     = "telegraf-ems-filtered-int"
  connection_timeout = "30s"

  data_format = "json"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "unit/+/+/+/+/+"
    tags  = "_/unit_id/device/instance/point_name/dtype"

# ── Filter B: Dedup integer/boolean metrics ───────────────────────────────
# Only applies to ems_int — floats pass through unaffected.
# A metric is dropped if value is identical to the previously sent value
# and less than dedup_interval has elapsed.
[[processors.dedup]]
  namepass       = ["ems_int"]
  dedup_interval = "60s"

# ── Internal metrics ──────────────────────────────────────────────────────
[[inputs.internal]]
  collect_memstats = false

# ── Output: InfluxDB v2 filtered ──────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb-filtered:8086"]
  token        = "ems-token-secret"
  organization = "ems-org"
  bucket       = "ems-filtered"
  timeout      = "10s"
