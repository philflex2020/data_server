# telegraf.conf — ems/# replay comparison against parquet_writer (v3 pipeline)
#
# Connects to the existing FlashMQ broker on .34 (port 11885).
# v3: typed converters before pivot — matches production IOx schema.
# Prometheus scrape at :9273 for internal throughput metrics.

[agent]
  omit_hostname       = true
  precision           = "1ms"
  flush_interval      = "5s"
  metric_batch_size   = 5000
  metric_buffer_limit = 200000

[[inputs.internal]]
  collect_memstats = false

[[inputs.mqtt_consumer]]
  servers   = ["tcp://192.168.86.34:11885"]
  topics    = ["ems/#"]
  client_id = "telegraf-influx-compare"
  qos       = 0
  max_undelivered_messages = 1000000
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    timestamp_path     = "ts"
    timestamp_format   = "2006-01-02T15:04:05Z"
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"

    # 6-segment: ems/site/{site_id}/root/{point_name}/{dtype}
    [[inputs.mqtt_consumer.topic_parsing]]
      topic       = "ems/site/+/root/+/+"
      tags        = "_/_/site_controller_id/_/point_name/data_type"
      measurement = "_/measurement/_/_/_/_"

    # 7-segment: ems/site/{site_id}/{device}/{instance}/{point_name}/{dtype}
    [[inputs.mqtt_consumer.topic_parsing]]
      topic       = "ems/site/+/+/+/+/+"
      tags        = "_/_/site_controller_id/_/source_device_id/point_name/data_type"
      measurement = "_/_/_/measurement/_/_/_"

    # 8-segment: ems/site/{site_id}/unit/{unit_id}/root/{point_name}/{dtype}
    [[inputs.mqtt_consumer.topic_parsing]]
      topic       = "ems/site/+/unit/+/root/+/+"
      tags        = "_/_/site_controller_id/_/unit_controller_id/_/point_name/data_type"
      measurement = "_/_/_/measurement/_/_/_/_"

    # 9-segment: ems/site/{site_id}/unit/{unit_id}/{device}/{instance}/{point_name}/{dtype}
    [[inputs.mqtt_consumer.topic_parsing]]
      topic       = "ems/site/+/unit/+/+/+/+/+"
      tags        = "_/_/site_controller_id/_/unit_controller_id/_/source_device_id/point_name/data_type"
      measurement = "_/_/_/_/_/measurement/_/_/_"

    [[inputs.mqtt_consumer.topic_parsing]]
      topic       = "ems/custom/#"
      measurement = "_/measurement/#"

# Cast to stable types before pivot (v3 approach)
[[processors.converter]]
  order = 1
  [processors.converter.tagpass]
    data_type = ["float"]
  [processors.converter.fields]
    float = ["value"]

[[processors.converter]]
  order = 1
  [processors.converter.tagpass]
    data_type = ["integer","boolean_integer"]
  [processors.converter.fields]
    integer = ["value"]

[[processors.converter]]
  order = 1
  [processors.converter.tagpass]
    data_type = ["string"]
  [processors.converter.fields]
    string = ["value"]

[[processors.pivot]]
  order     = 2
  tag_key   = "data_type"
  value_key = "value"

[[outputs.prometheus_client]]
  listen = ":9273"
  path   = "/metrics"

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb-compare:8086"]
  token        = "ems-token-secret"
  organization = "ems-org"
  bucket       = "ems-data"
  namedrop     = ["internal_*"]
  timeout      = "10s"
