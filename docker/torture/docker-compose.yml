version: "3.9"

networks:
  torture:
    name: torture_net
    driver: bridge

# Named volumes removed — writers use bind mounts on dedicated disks:
#   writer-a/b → /mnt/tort-sdf   (sdf, ~870 GB free)
#   writer-c/d → /mnt/tort-sdg   (sdg, ~870 GB free)

services:

  # ── MQTT broker (FlashMQ — multi-threaded, handles 80k+ msg/s fan-out) ───
  broker:
    image: flashmq:torture
    build:
      context: ../..
      dockerfile: docker/torture/Dockerfile.flashmq
    container_name: torture_broker
    networks: [torture]
    ports:
      - "11883:1883"   # host port 11883 → broker 1883 (avoids conflict with live broker)
    restart: always
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "hc", "-m", "1", "-q", "0"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Stress runners (C++ — one per writer shard, ~300k msg/s each) ─────────
  stress-a:
    image: stress-pub:torture
    build:
      context: ../..
      dockerfile: docker/torture/Dockerfile.stress
    container_name: torture_stress_a
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    command: ["--host", "broker", "--port", "1883", "--prefix", "batteries_a",
              "--racks", "12", "--modules", "8", "--cells", "52", "--conns", "1"]
    restart: unless-stopped

  stress-b:
    image: stress-pub:torture
    container_name: torture_stress_b
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    command: ["--host", "broker", "--port", "1883", "--prefix", "batteries_b",
              "--racks", "12", "--modules", "8", "--cells", "52", "--conns", "1"]
    restart: unless-stopped

  stress-c:
    image: stress-pub:torture
    container_name: torture_stress_c
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    command: ["--host", "broker", "--port", "1883", "--prefix", "batteries_c",
              "--racks", "12", "--modules", "8", "--cells", "52", "--conns", "1"]
    restart: unless-stopped

  stress-d:
    image: stress-pub:torture
    container_name: torture_stress_d
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    command: ["--host", "broker", "--port", "1883", "--prefix", "batteries_d",
              "--racks", "12", "--modules", "8", "--cells", "52", "--conns", "1"]
    restart: unless-stopped

  # ── Writer A — baseline, always running ─────────────────────────────────
  writer-a:
    image: parquet-writer:latest
    container_name: torture_writer_a
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - /mnt/tort-sdf/data-a:/data/parquet
      - /mnt/tort-sdf/wal-a:/wal
      - ./configs/writer-a.yaml:/etc/writer/config.yaml:ro
    ports:
      - "8771:8771"
    restart: unless-stopped

  # ── Writer B — broker-kill target ────────────────────────────────────────
  writer-b:
    image: parquet-writer:latest
    container_name: torture_writer_b
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - /mnt/tort-sdf/data-b:/data/parquet
      - /mnt/tort-sdf/wal-b:/wal
      - ./configs/writer-b.yaml:/etc/writer/config.yaml:ro
    ports:
      - "8772:8771"
    restart: unless-stopped

  # ── Writer C — disk-fill / chmod target ──────────────────────────────────
  writer-c:
    image: parquet-writer:latest
    container_name: torture_writer_c
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - /mnt/tort-sdg/data-c:/data/parquet
      - /mnt/tort-sdg/wal-c:/wal
      - ./configs/writer-c.yaml:/etc/writer/config.yaml:ro
    ports:
      - "8773:8771"
    restart: unless-stopped

  # ── Writer D — kill-9 / overflow target ──────────────────────────────────
  writer-d:
    image: parquet-writer:latest
    container_name: torture_writer_d
    networks: [torture]
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - /mnt/tort-sdg/data-d:/data/parquet
      - /mnt/tort-sdg/wal-d:/wal
      - ./configs/writer-d.yaml:/etc/writer/config.yaml:ro
    ports:
      - "8774:8771"
    restart: unless-stopped

  # ── Fault injector — runs scenarios on demand or in a loop ───────────────
  fault:
    image: alpine:3.19
    container_name: torture_fault
    networks: [torture]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/fault_inject.sh:/fault_inject.sh:ro
      - /mnt/tort-sdg/data-c:/data-c
    environment:
      SCENARIO: ${SCENARIO:-all}
      CYCLE_SECONDS: ${CYCLE_SECONDS:-60}
      TARGET: ${TARGET:-torture_writer_d}
    entrypoint: ["sh", "-c", "apk add -q docker-cli bash util-linux && bash /fault_inject.sh"]
    profiles: ["fault"]   # only starts when explicitly requested
