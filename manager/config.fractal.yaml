websocket:
  host: 0.0.0.0
  port: 8761

# Phase 1 migration testbed on fractal-phil (192.168.86.51)
#
# Architecture:
#
#   Generator / stress_runner
#         │ MQTT :1883
#         ▼
#   FlashMQ host :1883  ──bridge──▶  FlashMQ aws-sim :1884
#         │                                  │
#         │                         ┌────────┴───────────────┐
#         │                         │                        │
#         ▼  EDGE PATH              ▼  OLD PATH              ▼  NEW PATH
#    writer.cpp                  Telegraf              subscriber_api
#    → /srv/data/parquet       → InfluxDB2 :8086       DuckDB :8767
#         │                                                   ▲
#         └──────────────── rsync-sim (5 s) ─────────────────┘
#                        /srv/data/parquet-aws-sim
#
# migration_compare.py (manual script) compares InfluxDB2 vs DuckDB on demand.
#
# flashmq_host and influxdb/telegraf are systemd services — manager follows logs.
# flashmq_aws is a managed process (second FlashMQ on port 1884).
# The FlashMQ bridge (host → aws) is configured via /etc/flashmq/bridge-conf.d/.
#
# Start order: host broker → aws broker → old path → edge path → load

order:
  # ── Brokers ────────────────────────────────────────────────────
  - flashmq_host
  - flashmq_aws
  # ── Old path (AWS sim) ─────────────────────────────────────────
  - influxdb
  - telegraf
  # ── Edge path ─────────────────────────────────────────────────
  - writer_cpp
  - rsync_sim
  - subscriber_api
  # ── Load generation ─────────────────────────────────────────────
  - stress_runner
  - generator

components:

  # ── Brokers ────────────────────────────────────────────────────

  # Host (edge) broker — generators publish here; FlashMQ bridge forwards to aws-sim
  # systemd-managed: manager follows logs only
  flashmq_host:
    label: "FlashMQ host :1883 (edge broker) [systemd log]"
    cmd: ["journalctl", "-fu", "flashmq", "--no-pager", "--output=short"]
    cwd: "."

  # AWS-sim broker — receives bridged data; Telegraf subscribes here
  # Managed process: second FlashMQ on port 1884
  flashmq_aws:
    label: "FlashMQ aws-sim :1884 (dummy AWS broker)"
    cmd: ["flashmq", "--config-file", "source/telegraf/flashmq-aws-sim.conf"]
    cwd: "."
    ports: [1884]

  # ── Old path — systemd services (log follow only) ──────────────

  influxdb:
    label: "InfluxDB2 :8086 [systemd log]"
    cmd: ["journalctl", "-fu", "influxdb", "--no-pager", "--output=short"]
    cwd: "."

  # Telegraf subscribes to FlashMQ aws-sim :1884 → InfluxDB2
  telegraf:
    label: "Telegraf — FlashMQ aws-sim → InfluxDB2 [systemd log]"
    cmd: ["journalctl", "-fu", "telegraf", "--no-pager", "--output=short"]
    cwd: "."

  # ── Edge path — managed processes ──────────────────────────────

  # Subscribes to host FlashMQ :1883, writes Parquet to local disk
  writer_cpp:
    label: "writer.cpp — FlashMQ host → /srv/data/parquet"
    cmd: ["./parquet_writer", "--config", "config.yaml"]
    cwd: "source/parquet_writer_cpp"

  # Simulates S3 upload: rsync local Parquet → aws-sim directory every 5 s
  rsync_sim:
    label: "rsync-sim  /srv/data/parquet → parquet-aws-sim  [5 s loop]"
    cmd:
      - "bash"
      - "-c"
      - >-
        mkdir -p /srv/data/parquet-aws-sim &&
        while true; do
          rsync -a /srv/data/parquet/ /srv/data/parquet-aws-sim/;
          sleep 5;
        done
    cwd: "."

  # DuckDB reads rsynced Parquet — simulates the AWS query layer
  # Connects to host FlashMQ :1883 for live MQTT subscription
  subscriber_api:
    label: "Subscriber API (MQTT live + DuckDB → parquet-aws-sim) :8767"
    cmd: [".venv/bin/python", "server.py", "--config", "config.fractal.yaml"]
    cwd: "subscriber/api"
    ports: [8767]

  # ── Load generators (publish to host FlashMQ :1883) ─────────────

  stress_runner:
    label: "Stress Runner (sustained MQTT load) :8769"
    cmd: [".venv/bin/python", "stress_runner.py", "--config", "config.yaml"]
    cwd: "source/stress_runner"
    ports: [8769]

  generator:
    label: "Data Generator :8765"
    cmd: [".venv/bin/python", "generator.py", "--config", "config.yaml"]
    cwd: "source/generator"
    ports: [8765]
