websocket:
  host: 0.0.0.0
  port: 8762

auto_start: true

# Full NATS stack on spark-22b6
# Generator runs via config.spark-orig.yaml (shared Mosquitto on port 1883)
order:
  - minio
  - nats
  - nats_bridge
  - parquet_writer
  - aws_server
  - subscriber_api
  - stress_runner

components:

  minio:
    label: "S3 Store (MinIO)"
    cmd: ["./minio", "server", "./minio-data", "--console-address", ":9011"]
    cwd: "aws/data_store"
    ports: [9000, 9011]
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  nats:
    label: "NATS JetStream"
    cmd: ["nats-server", "-c", "nats-server.conf"]
    cwd: "manager"
    ports: [4222]

  nats_bridge:
    label: "MQTT → NATS Bridge"
    cmd: [".venv/bin/python", "bridge.py", "--config", "config.spark.yaml"]
    cwd: "source/nats_bridge"

  parquet_writer:
    label: "Parquet Writer (NATS → S3)"
    cmd: [".venv/bin/python", "writer.py", "--config", "config.yaml"]
    cwd: "source/parquet_writer"

  aws_server:
    label: "AWS Data Store Server"
    cmd: [".venv/bin/python", "server.py", "--config", "config.yaml"]
    cwd: "aws/data_store"
    ports: [8766]

  subscriber_api:
    label: "Subscriber API (NATS + DuckDB)"
    cmd: [".venv/bin/python", "server.py", "--config", "config.yaml"]
    cwd: "subscriber/api"
    ports: [8767, 8768]

  stress_runner:
    label: "Stress Runner (multi-project 24/7)"
    cmd: [".venv/bin/python", "stress_runner.py", "--config", "config.spark.yaml"]
    cwd: "source/stress_runner"
