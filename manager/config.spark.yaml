websocket:
  host: 0.0.0.0
  port: 8762

auto_start: true

# Components that run on spark-22b6
order:
  - minio
  - aws_server

components:

  minio:
    label: "S3 Store (MinIO)"
    cmd: ["./minio", "server", "./minio-data", "--console-address", ":9011"]
    cwd: "aws/data_store"
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  aws_server:
    label: "AWS Data Store Server"
    cmd: [".venv/bin/python","server.py", "--config", "config.yaml"]
    cwd: "aws/data_store"
