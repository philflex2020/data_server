websocket:
  host: 0.0.0.0
  port: 8761

# Start order: broker → NATS → bridge → writers → subscribers
# minio and aws_server run on spark-22b6 (see manager/config.spark.yaml)
order:
  - mosquitto
  - nats
  - nats_bridge
  - generator
  - parquet_writer
  - subscriber_api

components:

  mosquitto:
    label: "MQTT Broker (Mosquitto)"
    cmd: ["/usr/sbin/mosquitto", "-p", "1884", "-v"]
    cwd: "."
    ports: [1884]

  nats:
    label: "NATS JetStream"
    cmd: ["nats-server", "-c", "nats-server.conf"]
    cwd: "manager"
    ports: [4222]

  nats_bridge:
    label: "MQTT → NATS Bridge"
    cmd: [".venv/bin/python","bridge.py", "--config", "config.yaml"]
    cwd: "source/nats_bridge"

  generator:
    label: "Data Generator"
    cmd: [".venv/bin/python","generator.py", "--config", "config.yaml"]
    cwd: "source/generator"

  parquet_writer:
    label: "Parquet Writer (NATS → S3)"
    cmd: [".venv/bin/python","writer.py", "--config", "config.yaml"]
    cwd: "source/parquet_writer"

  subscriber_api:
    label: "Subscriber API (NATS + DuckDB)"
    cmd: [".venv/bin/python","server.py", "--config", "config.yaml"]
    cwd: "subscriber/api"
    ports: [8767, 8768]
