websocket:
  host: 0.0.0.0
  port: 8761

# Start order: NATS (with native MQTT on 1883) → writers → subscribers → generator
# minio and aws_server run on spark-22b6 (see manager/config.spark.yaml)
order:
  - nats
  - parquet_writer
  - subscriber_api
  - generator

components:

  nats:
    label: "NATS JetStream"
    cmd: ["nats-server", "-c", "nats-server.conf"]
    cwd: "manager"
    ports: [4222]

  generator:
    label: "Data Generator"
    cmd: [".venv/bin/python","generator.py", "--config", "config.yaml"]
    cwd: "source/generator"

  parquet_writer:
    label: "Parquet Writer (NATS → S3)"
    cmd: [".venv/bin/python","writer.py", "--config", "config.yaml"]
    cwd: "source/parquet_writer"

  subscriber_api:
    label: "Subscriber API (NATS + DuckDB)"
    cmd: [".venv/bin/python","server.py", "--config", "config.yaml"]
    cwd: "subscriber/api"
    ports: [8767, 8768]
