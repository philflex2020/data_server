# AWS NATS hub simulation — runs alongside host NATS on same machine
# Port 4333: client connections (web clients, subscriber API)
# Port 7422: leaf node listener (site hosts connect here)
# Port 8333: HTTP monitoring

port: 4333
http_port: 8333

jetstream {
  store_dir: "./nats-aws-data"
  max_memory_store: 1GB
  max_file_store: 10GB
}

# Accept leaf node connections from site hosts
leafnodes {
  port: 7422
}
