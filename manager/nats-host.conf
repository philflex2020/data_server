# Host NATS — same as nats-server.conf but with leaf node to AWS sim
# Used during nats_report_x86 scale test

port: 4222
http_port: 8222

mqtt {
  port: 1883
}

jetstream {
  store_dir: "./nats-data"
  max_memory_store: 512MB
  max_file_store: 50GB
  sync_interval: "1s"
}

# Dial out to AWS NATS hub (leaf node — host initiates, firewall-friendly)
leafnodes {
  remotes = [
    { urls: ["nats://localhost:7422"] }
  ]
}
