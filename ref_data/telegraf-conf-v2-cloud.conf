[agent]
  omit_hostname = true
  precision = "1ms"
  debug = {{ .Values.telegraf.debug }}
  flush_interval = "5s"
  metric_batch_size = 50000
  metric_buffer_limit = 200000

[[inputs.internal]]
  collect_memstats = false

[[inputs.mqtt_consumer]]
  servers = ["$MQTT_HOST"]

  # Shared subscription so multiple Telegraf replicas split the load evenly.
  # Use a distinct group name for the v2 pipeline.
  topics = ["$share/telegrafs-v2/ems/#"]

  # Unique client ID per pod (Kubernetes sets $HOSTNAME automatically)
  client_id = "telegraf-v2-${HOSTNAME}"

  qos = 0
  max_undelivered_messages = 1000000
  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    timestamp_path = "ts"  # GJSON path to field containing timestamp
    timestamp_format = "2006-01-02T15:04:05Z"  # Go time reference to iso 8601 timestamp
    timestamp_timezone = "UTC"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"

    #6 segments
    [[inputs.mqtt_consumer.topic_parsing]]
      topic = "ems/site/+/root/+/+"
      tags = "_/_/site_controller_id/_/point_name/data_type"
      measurement = "_/measurement/_/_/_/_"

    #7 segments
    [[inputs.mqtt_consumer.topic_parsing]]
      topic = "ems/site/+/+/+/+/+"
      tags = "_/_/site_controller_id/_/source_device_id/point_name/data_type"
      measurement = "_/_/_/measurement/_/_/_"

    #8 segments
    [[inputs.mqtt_consumer.topic_parsing]]
      topic = "ems/site/+/unit/+/root/+/+"
      tags = "_/_/site_controller_id/_/unit_controller_id/_/point_name/data_type"
      measurement = "_/_/_/measurement/_/_/_/_"

    #9 segments
    [[inputs.mqtt_consumer.topic_parsing]]
      topic = "ems/site/+/unit/+/+/+/+/+"
      tags = "_/_/site_controller_id/_/unit_controller_id/_/source_device_id/point_name/data_type"
      measurement = "_/_/_/_/_/measurement/_/_/_"

    #Custom topics
    [[inputs.mqtt_consumer.topic_parsing]]
      topic = "ems/custom/#"
      measurement = "_/measurement/#"

# Pivot the metric, to allow multiple data types in single measurement
[[processors.pivot]]
  order = 1
  tag_key = "data_type"
  value_key = "value"

[[outputs.prometheus_client]]
  listen = ":9273"
  path = "/metrics"

[[outputs.influxdb_v2]]
  urls = ["$INFLUX_HOST"]
  token = "$INFLUX_TOKEN"
  organization = "$INFLUX_ORG"
  bucket = "$INFLUX_BUCKET"
  namedrop = ["internal_*"]
  content_encoding = "gzip"
  timeout = "10s"
  # Throughput tuning
  concurrent_writes = 2

[[outputs.influxdb_v2]]
  urls = ["$INFLUX_URL_CLOUD"]
  token = "$INFLUX_TOKEN_CLOUD"
  organization = "$INFLUX_ORG_CLOUD"
  bucket = "$INFLUX_BUCKET_CLOUD"
  namedrop = ["internal_*"]
  content_encoding = "gzip"
  timeout = "10s"
  # Throughput tuning
  concurrent_writes = 2
