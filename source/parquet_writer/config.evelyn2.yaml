# parquet_writer config — evelyn2 demo on phil-256g (.34)
#
# Consumes full Longbow-format topics from ems_site_simulator (no --topic-prefix):
#
#   9-seg  ems/site/{site_id}/unit/{unit_id}/{device}/{instance}/{point_name}/{dtype_hint}
#   8-seg  ems/site/{site_id}/unit/{unit_id}/root/{point_name}/{dtype_hint}
#   7-seg  ems/site/{site_id}/{device}/{instance}/{point_name}/{dtype_hint}
#   6-seg  ems/site/{site_id}/root/{point_name}/{dtype_hint}
#
# Start simulator (separate terminal):
#   ./ems_site_simulator --host localhost --units 4 --site-id 0215D1D8 --rate 7000 --ws-port 8769
#
# Start writer:
#   ./parquet_writer --config config.evelyn2.yaml
#
# Health:
#   curl http://localhost:8773/health

mqtt:
  host: localhost
  port: 1883
  client_id: parquet-writer-evelyn2
  topic: "ems/#"
  qos: 0

  topic_parser: positional
  partition_field: site_id
  timestamp_field:  ts
  timestamp_format: iso8601

  topic_patterns:
    - match: "ems/site/+/unit/+/+/+/+/+"
      segments: ["_","_","site_id","_","unit_id","device","instance","point_name","dtype_hint"]

    - match: "ems/site/+/unit/+/+/+/+"
      segments: ["_","_","site_id","_","unit_id","device","point_name","dtype_hint"]

    - match: "ems/site/+/+/+/+/+"
      segments: ["_","_","site_id","device","instance","point_name","dtype_hint"]

    - match: "ems/site/+/+/+/+"
      segments: ["_","_","site_id","device","point_name","dtype_hint"]

output:
  base_path: /mnt/tort-sdf/evelyn2/parquet
  site_id: ""          # extracted from topic segment 2
  partitions:
    - "site={site_id}"
    - "{year}"
    - "{month}"
    - "{day}"
  compression: snappy
  flush_interval_seconds: 30
  max_messages_per_part: 2000000
  max_total_buffer_rows: 500000

wal:
  enabled: true
  path: /mnt/tort-sdf/evelyn2/wal

health:
  enabled: true
  port: 8773

guard:
  min_free_gb: 2.0

compact:
  enabled: false

# ---------------------------------------------------------------------------
# COV null-fill — wide-pivot change-on-value filtering
# ---------------------------------------------------------------------------
# null_fill_unchanged: true        suppress column if value has not changed
#                                  (only active when topic_patterns uses
#                                   compound_field_name / wide-pivot mode)
#
# null_fill_cov_pct: 0.01          global threshold — suppress if |Δ|/|prev| ≤ 1%
#                                  0.0 (default) = exact equality only
#
# null_fill_per_point:             per-column overrides; first matching pattern wins.
#   <pattern>: <threshold>         supports shell-style wildcards:
#                                    *  — any sequence of chars (crosses '/')
#                                    ?  — any single char
#                                  0.0 forces exact-equality for that pattern.
#                                  List specific patterns before broad ones.
#
# null_fill_reset_interval_seconds: 3600   force full write every N seconds so
#                                          each compaction window is self-contained.
#                                          0 = never reset.
#
# Example (uncomment to enable):
#
# null_fill_unchanged: true
# null_fill_cov_pct: 0.01                      # global 1% — suppress slow-moving signals
# null_fill_per_point:
#   ems/*/battery/soc: 0.005                   # SOC — tighter, 0.5%
#   ems/*/grid/freq*: 0.001                    # frequency — very tight, 0.1%
#   ems/*/hvac/*: 0.05                         # HVAC signals — loose, 5%
#   ems/*/pcs/dc_voltage: 0.002                # DC voltage — 0.2%
#   ems/*/pcs/status_*: 0.0                    # status bits — exact equality only
# null_fill_reset_interval_seconds: 3600
