# NATS JetStream (replaces direct MQTT subscription)
nats:
  url: "nats://localhost:4222"
  stream_name: BATTERY_DATA
  consumer_name: parquet-writer   # durable — survives restarts, replays on reconnect
  subject_filter: "batteries.>"

# Buffer — flush to Parquet after this many seconds or messages (whichever first)
buffer:
  flush_interval_seconds: 60
  max_messages: 50000
  fetch_batch: 5000              # messages to pull from NATS per iteration

# S3 / MinIO target
s3:
  endpoint_url: "http://spark-22b6:9000"  # MinIO on spark-22b6; remove for real AWS S3
  bucket: battery-data
  region: us-east-1
  access_key: minioadmin
  secret_key: minioadmin
  prefix: ""
  project_id: 0
  # Partition order — change here only; code reads this list at runtime.
  # Available variables: {project_id} {site_id} {year} {month} {day} {hour}
  partitions:
    - "project={project_id}"
    - "site={site_id}"
    - "{year}"
    - "{month}"
    - "{day}"

# Parquet
parquet:
  compression: snappy             # snappy | zstd | gzip
