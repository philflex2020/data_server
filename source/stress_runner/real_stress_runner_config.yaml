# real_stress_runner config — replicates Longbow production EMS topology
#
# At 4 units × 1770 topics = 7,080 msgs/sweep at 1s interval = ~7k msgs/sec
# At 46 units × 1770 topics = 81,420 msgs/sweep at 1s interval = ~81k msgs/sec
#   (matches full Longbow site; real avg frame ~166 B → ~17× parquet ratio)
#
# Set num_units or provide explicit unit_ids list.
# unit_ids overrides num_units if both are set.

mqtt:
  host: localhost
  port: 1883
  client_id: real-stress-runner
  username: ""
  password: ""

websocket:
  host: 0.0.0.0
  port: 8769

# Topic template extracted from real Longbow recording
# (same dir as this file — 1770 unique ems/ topics per unit)
template_file: ""   # empty = auto-detect (ems_topic_template.json in script dir)

# Site ID from real recording
site_id: "0215D1D8"

# How many synthetic units to simulate (generates hex IDs like 0215F5DD, 0215F5DE, ...)
# Ignored if unit_ids is set.
num_units: 4

