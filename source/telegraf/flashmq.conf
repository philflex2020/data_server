# FlashMQ configuration — local x86 test broker
# Replaces AWS IoT Core for the Telegraf pipeline test
# Syntax: https://www.flashmq.org/man/flashmq.conf.5

log_file /tmp/flashmq.log
log_level info

allow_anonymous true

thread_count 4

listen {
    port 1883
    protocol mqtt
}

# Bridge config — generated by source/bridge/gen_bridge_conf.py from source/bridge/bridge.yaml.
# Create the directory and generate the file, then reload:
#
#   mkdir -p /etc/flashmq/bridge-conf.d
#   python3 source/bridge/gen_bridge_conf.py source/bridge/bridge.yaml \
#           --output /etc/flashmq/bridge-conf.d/bridge.conf
#   flashmq --reload-config
#
# Omit or comment out this line if no bridge is needed.
include_dir /etc/flashmq/bridge-conf.d
