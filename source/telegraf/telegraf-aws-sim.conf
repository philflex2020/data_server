# Telegraf configuration — FlashMQ aws-sim (MQTT) → InfluxDB2
# AWS-sim:  FlashMQ aws-sim on localhost:1884, InfluxDB2 on localhost:8086
# Production path: replace localhost with cloud endpoints
#
# Two topic modes are supported:
#   per_cell       batteries/project=0/site=0/rack=0/module=0/cell=0
#                  JSON payload: {"project_id":0,"site_id":0,...,"voltage":3.7,...}
#                  Tags extracted from JSON body; all named fields captured.
#
#   per_cell_item  batteries/project=0/site=0/rack=0/module=0/cell=0/voltage
#                  JSON payload: {"timestamp":1234.0,"value":3.7}
#                  Tags extracted via topic_parsing; single "value" field captured.
#                  Note: tag values keep the "key=value" segment form (project_id="project=0").

[agent]
  interval            = "1s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 100000
  flush_interval      = "10s"
  flush_jitter        = "2s"
  precision           = "1s"
  hostname            = "data-server"
  omit_hostname       = false

# ── Input: FlashMQ MQTT broker ────────────────────────────────────────────────

[[inputs.mqtt_consumer]]
  servers   = ["tcp://localhost:1884"]
  topics    = ["batteries/#", "solar/#"]
  qos       = 0
  client_id = "telegraf-aws-sim"
  connection_timeout = "30s"
  keepalive          = 60
  data_format        = "json_v2"

  # per_cell_item topic_parsing — matches only 7-segment topics (per_cell_item mode).
  # per_cell topics have 6 segments and will not match; their tags come from the JSON body.
  # Tag values include the key= prefix, e.g. project_id="project=0" — acceptable for demo.
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "batteries/+/+/+/+/+/+"
    tags  = "_/project_id/site_id/rack_id/module_id/cell_id/field_name"

  # battery cells (per_cell AND per_cell_item)
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "battery_cell"

    # Identity tags — in JSON for per_cell mode; from topic_parsing in per_cell_item mode.
    # All optional so per_cell_item payloads (which lack these keys) don't cause errors.
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "project_id"  optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "site_id"     optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "rack_id"     optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "module_id"   optional = true
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "cell_id"     optional = true

    # Timestamp — present in both modes
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "timestamp"  type = "float"

    # per_cell_item: single "value" field with the measurement reading
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"       type = "float"  optional = true

    # per_cell: named battery fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage"     type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "current"     type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature" type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soc"         type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soh"         type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "resistance"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "capacity"    type = "float"  optional = true

    # solar fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "irradiance"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "panel_temp"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "dc_voltage"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "dc_current"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ac_power"    type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "efficiency"  type = "float"  optional = true

# ── Output: InfluxDB v2 (pseudo-AWS) ─────────────────────────────────────────

[[outputs.influxdb_v2]]
  urls         = ["http://localhost:8086"]
  token        = "battery-token-secret"
  organization = "battery-org"
  bucket       = "battery-data"
  timeout      = "5s"

# ── Telegraf health metrics ───────────────────────────────────────────────────

[[inputs.internal]]
  collect_memstats = false
