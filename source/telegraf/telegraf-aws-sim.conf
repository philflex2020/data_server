# Telegraf configuration — FlashMQ aws-sim (MQTT) → InfluxDB2
# AWS-sim:  FlashMQ aws-sim on localhost:1884, InfluxDB2 on localhost:8086
# Production path: replace localhost with cloud endpoints

[agent]
  interval            = "1s"
  round_interval      = true
  metric_batch_size   = 1000
  metric_buffer_limit = 5000    # deliberately low to demo silent drops under load
  flush_interval      = "10s"
  flush_jitter        = "2s"
  precision           = "1s"
  hostname            = "data-server"
  omit_hostname       = false

# ── Input: FlashMQ MQTT broker ────────────────────────────────────────────────

[[inputs.mqtt_consumer]]
  servers   = ["tcp://localhost:1884"]
  topics    = ["batteries/#", "solar/#"]
  qos       = 1
  client_id = "telegraf-aws-sim"
  connection_timeout = "30s"
  keepalive          = 60
  data_format        = "json_v2"

  # battery cells
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "battery_cell"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "project_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "site_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "rack_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "module_id"
    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "cell_id"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "timestamp"  type = "float"
    # battery fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "voltage"     type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "current"     type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temperature" type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soc"         type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "soh"         type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "resistance"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "capacity"    type = "float"  optional = true
    # solar fields
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "irradiance"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "panel_temp"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "dc_voltage"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "dc_current"  type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ac_power"    type = "float"  optional = true
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "efficiency"  type = "float"  optional = true

# ── Output: InfluxDB v2 (pseudo-AWS) ─────────────────────────────────────────

[[outputs.influxdb_v2]]
  urls         = ["http://localhost:8086"]
  token        = "battery-token-secret"
  organization = "battery-org"
  bucket       = "battery-data"
  timeout      = "5s"

# ── Telegraf health metrics ───────────────────────────────────────────────────

[[inputs.internal]]
  collect_memstats = false
