# telegraf config — SBESS3 bench MQTT → InfluxDB2
#
# Topic:   bench/{source_type}/{unit_id}/{device}/{instance}/{point_name}/{dtype_hint}
# Payload: {"ts": "2026-04-13T16:33:31.219Z", "value": 63.5}
# Schema:  measurement=bench, tags=(unit_id,device,instance,point_name), field=value
#
# Start:
#   telegraf --config /home/phil/data_server/source/telegraf/telegraf-sbess3.conf
#
# InfluxDB2:  org=longbow  bucket=sbess3  http://localhost:8086
#
# Flux query example:
#   from(bucket:"sbess3") |> range(start:-1h)
#     |> filter(fn:(r) => r.unit_id == "0215D1D8" and r.point_name == "SysSOC")

[agent]
  interval            = "10s"
  flush_interval      = "10s"
  metric_buffer_limit = 200000
  omit_hostname       = true

[[outputs.influxdb_v2]]
  urls         = ["http://localhost:8086"]
  token        = "xEbFxkBI0kQ4_wnMZOQ6M8ERvtIGhQt8kx7O9yI6ovr_ihwDVeo8gTI4-XYnu-zRMIxldPd73glCesccK3E9Dg=="
  organization = "longbow"
  bucket       = "sbess3"

[[inputs.mqtt_consumer]]
  servers              = ["tcp://localhost:1883"]
  topics               = ["bench/#"]
  client_id            = "telegraf-sbess3"
  qos                  = 0
  # store_metadata = false suppresses the auto topic tag
  topic_tag            = ""

  data_format = "json_v2"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "bench"
    timestamp_path   = "ts"
    timestamp_format = "RFC3339"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "value"
      type = "float"

  # extract unit_id, device, instance, point_name from topic
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "bench/+/+/+/+/+"
    tags  = "_/unit_id/device/instance/point_name/_"
