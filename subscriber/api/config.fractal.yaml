# Subscriber API — fractal-phil sim (aws-sim side)
# Real-time:  aiomqtt → FlashMQ aws-sim :1884
# Historical: DuckDB → /srv/data/parquet-aws-sim  (rsync-sim + gap writer)

mqtt:
  host: localhost
  port: 1884                    # FlashMQ aws-sim
  client_id: subscriber-api

local:
  path: /srv/data/parquet-aws-sim/batteries

# WebSocket server (subscriber.html)
websocket:
  host: 0.0.0.0
  port: 8767

# Flux-compatible HTTP API (orig_aws.html)
flux_http:
  port: 8768
  default_route: both    # influx | duckdb | both  (persists across monitor reconnects)

# InfluxDB2 proxy (for /influx_health — avoids browser CORS on :8086)
# passthrough: true  = Phase 1 (proxy Flux queries to InfluxDB, track stats)
# passthrough: false = Phase 3+ (translate Flux → DuckDB SQL)
influx:
  host:        localhost
  port:        8086
  passthrough: true
  token:       battery-token-secret
  org:         battery-org
  bucket:      battery-data

# S3 / MinIO store (boto3 upload — Start/Stop button in parquet_monitor)
# Set endpoint_url to real AWS endpoint or leave for MinIO local sim
s3:
  endpoint_url: "http://localhost:9000"
  bucket:       battery-data
  region:       us-east-1
  access_key:   minioadmin
  secret_key:   minioadmin
  prefix:       ""
  sync_interval: 10   # seconds between upload sweeps

# rsync control (parquet_monitor Start/Stop button)
rsync:
  src:      /srv/data/parquet/
  dst:      /srv/data/parquet-aws-sim/
  interval: 5   # seconds between runs

# Telegraf control (parquet_monitor buffer slider + restart)
telegraf:
  conf_path: /home/phil/data_server/source/telegraf/telegraf-aws-sim.conf
  binary:    /usr/bin/telegraf
  org:       battery-org
  token:     battery-token-secret

# History query limits
history:
  default_limit: 1000
  max_limit: 10000
