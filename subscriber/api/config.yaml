# MQTT broker (live data source)
mqtt:
  host: localhost
  port: 1883
  client_id: subscriber-api
  default_topic: "batteries/#"     # default topic for live subscription

# S3 / MinIO (historical data source)
s3:
  endpoint_url: "http://spark-22b6:9000"  # MinIO on spark-22b6
  bucket: battery-data
  region: us-east-1
  access_key: minioadmin
  secret_key: minioadmin
  prefix: ""
  gap_fill_prefix: "gap-fill"  # set to "" to disable gap-fill queries
  project_id: 0

# WebSocket server (monitor.html, subscriber.html)
websocket:
  host: 0.0.0.0
  port: 8767

# Flux-compatible HTTP API (orig_aws.html — point port here instead of 8086)
flux_http:
  port: 8768

# History query limits
history:
  default_limit: 1000
  max_limit: 10000

# In-memory ring buffer (gap-fill for recent data, covers parquet flush lag).
# Uses pre-allocated numpy arrays: ~60 bytes/entry vs ~2 KB for Python dicts.
# At 24k msg/s: 8_640_000 entries ≈ 520 MB and covers ~6 minutes.
# At  3k msg/s: 1_080_000 entries ≈  65 MB and covers ~6 minutes (original default).
buffer:
  maxlen: 8640000
