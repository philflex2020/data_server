# NATS JetStream (live data source — replaces direct MQTT)
nats:
  url: "nats://localhost:4222"
  stream_name: BATTERY_DATA
  default_subject: "batteries.>"   # default topic for live subscription

# S3 / MinIO (historical data source)
s3:
  endpoint_url: "http://spark-22b6:9000"  # MinIO on spark-22b6
  bucket: battery-data
  region: us-east-1
  access_key: minioadmin
  secret_key: minioadmin
  prefix: ""
  project_id: 0

# WebSocket server (monitor.html, subscriber.html)
websocket:
  host: 0.0.0.0
  port: 8767

# Flux-compatible HTTP API (orig_aws.html — point port here instead of 8086)
flux_http:
  port: 8768

# History query limits
history:
  default_limit: 1000
  max_limit: 10000
